name: diplochain_mobile
description: Application mobile de vérification de diplômes - DiploVérif BF
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.0

  # Scanner QR Code
  mobile_scanner: ^3.5.6

  # Stockage local
  shared_preferences: ^2.2.2

  # Polices Google
  google_fonts: ^6.1.0

  # Formatage des dates
  intl: ^0.19.0
  file_picker: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
